<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGL Fluid Lab — Interactive Fluid Text Distortion</title>
  <meta name="description" content="A real-time GPU wave simulation that ripples and refracts type. Built with Three.js and GLSL." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body class="select-none">

  <!-- Fullscreen WebGL canvas -->
  <canvas id="webgl_canvas"></canvas>

  <!-- Header overlay -->
  <header class="fixed top-0 left-0 right-0 z-40 p-6 flex justify-between items-center pointer-events-none">
    <div class="flex items-center gap-3 pointer-events-auto cursor-pointer">
      <span class="w-8 h-8 rounded-full sl-panel-bg flex items-center justify-center border sl-border shadow-sm">
        <span class="sl-accent font-['JetBrains_Mono'] text-xs font-bold">F</span>
      </span>
      <span class="font-['JetBrains_Mono'] text-sm font-bold tracking-tight">FLUID.LAB</span>
    </div>
    <div class="hidden md:flex items-center gap-8 text-xs font-semibold uppercase tracking-wider pointer-events-auto">
      <a href="#" class="hover:opacity-75 transition-opacity">Simulation</a>
      <a href="#" class="hover:opacity-75 transition-opacity">GLSL Shaders</a>
      <a href="#" class="hover:opacity-75 transition-opacity">Vite + Three.js</a>
    </div>
    <a
      href="https://github.com/tahabakri/webgl-fluid-lab"
      target="_blank"
      rel="noopener"
      class="pointer-events-auto rounded-full px-4 py-2 sl-panel-bg sl-accent border sl-border text-xs font-bold uppercase hover:opacity-90 transition-all shadow-sm"
    >
      Clone Repo
    </a>
  </header>

  <!-- Floating control panel -->
  <div class="control-panel rounded-3xl p-5 backdrop-blur-md">
    <div class="flex items-center gap-3 border-b sl-border pb-4 mb-4">
      <div class="w-8 h-8 rounded-xl sl-accent-soft flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5" aria-hidden="true">
          <path fill-rule="evenodd" d="M11.078 2.25c-.917 0-1.699.663-1.85 1.567L9.05 4.889c-.02.12-.115.26-.297.348a7.493 7.493 0 0 0-.986.57c-.166.115-.334.126-.45.083L6.3 5.508a1.875 1.875 0 0 0-2.282.819l-.922 1.597a1.875 1.875 0 0 0 .432 2.385l.84.692c.095.078.17.229.154.43a7.598 7.598 0 0 0 0 1.139c.015.2-.059.352-.153.43l-.841.692a1.875 1.875 0 0 0-.432 2.385l.922 1.597a1.875 1.875 0 0 0 2.282.818l1.019-.382c.115-.043.283-.031.45.082.312.214.641.405.985.57.182.088.277.228.297.35l.178 1.071c.151.904.933 1.567 1.85 1.567h1.844c.917 0 1.699-.663 1.85-1.567l.178-1.072c.02-.12.114-.26.297-.349.344-.165.673-.356.985-.57.167-.114.335-.125.45-.082l1.02.382a1.875 1.875 0 0 0 2.28-.819l.923-1.597a1.875 1.875 0 0 0-.432-2.385l-.84-.692c-.095-.078-.17-.229-.154-.43a7.614 7.614 0 0 0 0-1.139c-.016-.2.059-.352.153-.43l.84-.692c.708-.582.891-1.59.433-2.385l-.922-1.597a1.875 1.875 0 0 0-2.282-.818l-1.02.382c-.114.043-.282.031-.449-.083a7.49 7.49 0 0 0-.985-.57c-.183-.087-.277-.227-.297-.348l-.179-1.072a1.875 1.875 0 0 0-1.85-1.567h-1.843ZM12 15.75a3.75 3.75 0 1 0 0-7.5 3.75 3.75 0 0 0 0 7.5Z" clip-rule="evenodd" />
        </svg>
      </div>
      <div>
        <h4 class="text-sm font-bold sl-panel-text leading-none">Simulation Customizer</h4>
        <p class="text-[10px] sl-panel-muted mt-1">Tune the colours, type &amp; frame-buffer physics</p>
      </div>
    </div>

    <!-- Live controls -->
    <div class="space-y-4">
      <!-- Display phrase -->
      <div>
        <label for="custom_text_input" class="sl-label block font-semibold uppercase tracking-wide text-[10px] mb-1">Custom Display Phrase</label>
        <input
          type="text"
          id="custom_text_input"
          value="LIQUID LIGHT"
          maxlength="25"
          class="sl-input w-full rounded-xl px-3.5 py-2 text-sm font-medium"
        />
      </div>

      <!-- Palette -->
      <div>
        <label class="sl-label block font-semibold uppercase tracking-wide text-[10px] mb-2">Palette</label>
        <div class="flex items-center gap-3 flex-wrap">
          <div id="palette_swatches" class="flex items-center gap-2"></div>
          <div class="flex items-center gap-3 ml-auto">
            <label class="flex items-center gap-1.5 sl-label text-[10px] font-semibold uppercase tracking-wide cursor-pointer">
              <input type="color" id="bg_color_input" class="sl-color" value="#08252b" />
              Water
            </label>
            <label class="flex items-center gap-1.5 sl-label text-[10px] font-semibold uppercase tracking-wide cursor-pointer">
              <input type="color" id="text_color_input" class="sl-color" value="#5eead4" />
              Type
            </label>
          </div>
        </div>
      </div>

      <!-- Physics sliders -->
      <div class="grid grid-cols-3 gap-3">
        <div>
          <label for="damping_slider" class="sl-label block font-semibold uppercase tracking-wide text-[10px] mb-1">Damping</label>
          <input type="range" id="damping_slider" min="0.90" max="0.995" step="0.005" value="0.985" class="sl-range" />
        </div>
        <div>
          <label for="disp_slider" class="sl-label block font-semibold uppercase tracking-wide text-[10px] mb-1">Refraction</label>
          <input type="range" id="disp_slider" min="0.05" max="0.30" step="0.01" value="0.16" class="sl-range" />
        </div>
        <div>
          <label for="brush_slider" class="sl-label block font-semibold uppercase tracking-wide text-[10px] mb-1">Brush Size</label>
          <input type="range" id="brush_slider" min="15" max="90" step="1" value="45" class="sl-range" />
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
